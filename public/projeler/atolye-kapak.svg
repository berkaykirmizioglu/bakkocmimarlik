<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="800" fill="#cfc9bf"/>
  <!-- floor -->
  <rect y="620" width="1200" height="180" fill="#8a8580" opacity="0.5"/>
  <!-- concrete coffer ceiling -->
  <g fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
    <line x1="800" y1="0" x2="800" y2="160"/>
    <line x1="1000" y1="0" x2="1000" y2="160"/>
  </g>
  <!-- big industrial windows -->
  <g fill="#fafaf7" stroke="#0a0a0a" stroke-width="2">
    <rect x="100" y="200" width="320" height="380"/>
    <rect x="780" y="200" width="320" height="380"/>
  </g>
  <g stroke="#0a0a0a" stroke-width="1">
    <line x1="100" y1="295" x2="420" y2="295"/>
    <line x1="100" y1="390" x2="420" y2="390"/>
    <line x1="100" y1="485" x2="420" y2="485"/>
    <line x1="180" y1="200" x2="180" y2="580"/>
    <line x1="260" y1="200" x2="260" y2="580"/>
    <line x1="340" y1="200" x2="340" y2="580"/>
    <line x1="780" y1="295" x2="1100" y2="295"/>
    <line x1="780" y1="390" x2="1100" y2="390"/>
    <line x1="780" y1="485" x2="1100" y2="485"/>
    <line x1="860" y1="200" x2="860" y2="580"/>
    <line x1="940" y1="200" x2="940" y2="580"/>
    <line x1="1020" y1="200" x2="1020" y2="580"/>
  </g>
  <!-- worktable -->
  <rect x="460" y="520" width="280" height="100" fill="#a87a4b" opacity="0.7"/>
  <rect x="460" y="520" width="280" height="10" fill="#0a0a0a"/>
  <line x1="480" y1="620" x2="480" y2="700" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="720" y1="620" x2="720" y2="700" stroke="#0a0a0a" stroke-width="3"/>
</svg>
