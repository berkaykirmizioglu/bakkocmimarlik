<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="800" fill="#faf9f6"/>
  <!-- floor -->
  <rect y="560" width="1200" height="240" fill="#e6e3dc"/>
  <!-- back wall -->
  <rect x="0" y="100" width="1200" height="460" fill="#f3f1eb"/>
  <!-- tall window -->
  <rect x="700" y="140" width="400" height="420" fill="#fafaf7" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="900" y1="140" x2="900" y2="560" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="700" y1="350" x2="1100" y2="350" stroke="#0a0a0a" stroke-width="1"/>
  <!-- sofa silhouette -->
  <rect x="160" y="500" width="380" height="80" fill="#8a8580"/>
  <rect x="160" y="460" width="380" height="60" fill="#0a0a0a" opacity="0.85"/>
  <!-- light beam -->
  <polygon points="700,140 1100,140 980,560 820,560" fill="#fff" opacity="0.4"/>
</svg>
