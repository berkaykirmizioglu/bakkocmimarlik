<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="800" fill="#faf9f6"/>
  <!-- perspective floor -->
  <polygon points="0,800 1200,800 800,520 400,520" fill="#cfc9bf"/>
  <polygon points="400,520 800,520 720,360 480,360" fill="#e6e3dc"/>
  <!-- wall art -->
  <rect x="100" y="280" width="180" height="220" fill="#0a0a0a"/>
  <rect x="920" y="280" width="180" height="220" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <!-- ceiling light track -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="300" cy="120" r="6" fill="#0a0a0a"/>
  <circle cx="600" cy="120" r="6" fill="#0a0a0a"/>
  <circle cx="900" cy="120" r="6" fill="#0a0a0a"/>
</svg>
